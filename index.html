<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MaternaAI — Your Pregnancy Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:    #e8736a;
      --blush:   #f5c5c0;
      --cream:   #fdf6f0;
      --warm:    #f9ede6;
      --text:    #2d1f1a;
      --muted:   #8a6f69;
      --bubble-user: #e8736a;
      --bubble-bot:  #ffffff;
      --shadow:  0 8px 40px rgba(180,90,80,0.12);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Decorative background blobs ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #f7c5be, transparent 70%);
      top: -160px; right: -120px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #fdddd5, transparent 70%);
      bottom: -100px; left: -100px;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 14px;
      padding: 18px 28px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(232,115,106,0.15);
      box-shadow: 0 2px 18px rgba(180,90,80,0.07);
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--rose), #d45a52);
      border-radius: 14px;
      display: grid; place-items: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(232,115,106,0.4);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.1;
    }
    .header-text p {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .tier-badge {
      margin-left: auto;
      background: linear-gradient(135deg, #fff5f3, #ffe8e3);
      border: 1px solid var(--blush);
      color: var(--rose);
      font-size: .7rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: .03em;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative; z-index: 1;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 10px; }

    /* ── Messages ── */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: fadeUp .35s ease both;
    }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 16px;
      align-self: flex-end;
    }
    .avatar.bot  { background: linear-gradient(135deg, var(--rose), #d45a52); color:#fff; box-shadow: 0 3px 10px rgba(232,115,106,.35); }
    .avatar.user { background: var(--text); color:#fff; }

    .bubble {
      max-width: min(72%, 520px);
      padding: 13px 17px;
      border-radius: 20px;
      line-height: 1.6;
      font-size: .9rem;
      position: relative;
    }

    .msg-row.bot .bubble {
      background: var(--bubble-bot);
      color: var(--text);
      border-bottom-left-radius: 5px;
      box-shadow: 0 3px 18px rgba(180,90,80,0.1);
    }

    .msg-row.user .bubble {
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 5px;
      box-shadow: 0 3px 18px rgba(232,115,106,0.35);
    }

    .timestamp {
      font-size: .65rem;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg-row.user .timestamp { text-align: right; }

    /* ── Typing indicator ── */
    .typing-bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .typing-bubble span {
      width: 7px; height: 7px;
      background: var(--blush);
      border-radius: 50%;
      animation: bounce 1.1s infinite ease-in-out;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .18s; }
    .typing-bubble span:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-7px); }
    }

    /* ── Quick suggestions ── */
    #suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 12px;
      position: relative; z-index: 1;
    }

    .chip {
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--blush);
      color: var(--muted);
      font-size: .75rem;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all .2s;
      font-family: 'DM Sans', sans-serif;
      backdrop-filter: blur(6px);
    }
    .chip:hover {
      background: var(--rose);
      color: #fff;
      border-color: var(--rose);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(232,115,106,.3);
    }

    /* ── Input bar ── */
    #input-area {
      position: relative; z-index: 10;
      padding: 14px 20px 20px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(232,115,106,0.12);
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: #fff;
      border: 1.5px solid var(--blush);
      border-radius: 24px;
      padding: 10px 10px 10px 18px;
      box-shadow: 0 4px 20px rgba(180,90,80,0.09);
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap:focus-within {
      border-color: var(--rose);
      box-shadow: 0 4px 24px rgba(232,115,106,0.18);
    }

    #user-input {
      flex: 1;
      border: none; outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      color: var(--text);
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #user-input::placeholder { color: #c4a09a; }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--rose), #d45a52);
      color: #fff;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 3px 12px rgba(232,115,106,.4);
    }
    #send-btn:hover { transform: scale(1.07); box-shadow: 0 5px 18px rgba(232,115,106,.5); }
    #send-btn:active { transform: scale(.96); }
    #send-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Welcome card ── */
    .welcome-card {
      text-align: center;
      padding: 36px 24px;
      background: rgba(255,255,255,0.7);
      border-radius: 24px;
      border: 1px solid rgba(232,115,106,0.15);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .welcome-card .icon { font-size: 3rem; margin-bottom: 14px; }
    .welcome-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .welcome-card p { color: var(--muted); font-size: .875rem; line-height: 1.6; max-width: 320px; margin: 0 auto; }

    /* ── Alert bar ── */
    .alert-bar {
      background: linear-gradient(135deg, #fff8f0, #fff0eb);
      border: 1px solid #f5d4c8;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: .78rem;
      color: #b05a40;
      display: flex; align-items: center; gap: 8px;
      margin: 0 20px 4px;
      position: relative; z-index: 1;
    }
    .alert-bar span { font-size: 1rem; }

    /* Responsive */
    @media (max-width: 480px) {
      header { padding: 14px 16px; }
      #chat  { padding: 20px 12px; }
      #suggestions, #input-area { padding-left: 12px; padding-right: 12px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo-icon">🌸</div>
    <div class="header-text">
      <h1>MaternaAI</h1>
      <p>Your pregnancy & maternal health companion</p>
    </div>
    <div class="tier-badge">✦ Basic Tier</div>
  </header>

  <!-- Alert bar -->
  <div class="alert-bar">
    <span>💡</span>
    You're on the <strong>Basic Tier</strong> — ask me anything about pregnancy, postpartum, breastfeeding & newborn care!
  </div>

  <!-- Chat messages -->
  <div id="chat">
    <div class="welcome-card">
      <div class="icon">🤰</div>
      <h2>Hello, Mama-to-be!</h2>
      <p>I'm here to support you through every stage of pregnancy and beyond. Ask me anything!</p>
    </div>
  </div>

  <!-- Quick suggestions -->
  <div id="suggestions">
    <button class="chip" onclick="sendChip(this)">🤱 Breastfeeding tips</button>
    <button class="chip" onclick="sendChip(this)">😴 Sleep in first trimester</button>
    <button class="chip" onclick="sendChip(this)">🥗 What foods to avoid?</button>
    <button class="chip" onclick="sendChip(this)">💊 Folic acid dosage</button>
    <button class="chip" onclick="sendChip(this)">👶 Newborn feeding schedule</button>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div class="input-wrap">
      <textarea id="user-input" rows="1" placeholder="Ask about pregnancy, postpartum, newborn care…"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Enter to send (Shift+Enter for newline)
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendChip(btn) {
      input.value = btn.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
      sendMessage();
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMsg(text, role) {
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === 'bot' ? '🌸' : '👤';

      const col = document.createElement('div');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      const ts = document.createElement('div');
      ts.className = 'timestamp';
      ts.textContent = now();

      col.appendChild(bubble);
      col.appendChild(ts);

      row.appendChild(avatar);
      row.appendChild(col);

      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    function showTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typing-row';

      const avatar = document.createElement('div');
      avatar.className = 'avatar bot';
      avatar.textContent = '🌸';

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing-bubble';
      bubble.innerHTML = '<span></span><span></span><span></span>';

      row.appendChild(avatar);
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-row');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';

      // Remove welcome card on first message
      const wc = chat.querySelector('.welcome-card');
      if (wc) wc.remove();

      appendMsg(text, 'user');
      showTyping();

      try {
        const res = await fetch('http://localhost:5000/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: text })
        });

        removeTyping();

        if (!res.ok) throw new Error('Server error');
        const data = await res.json();
        appendMsg(data.answer || data.response || 'Sorry, I could not get a response.', 'bot');
      } catch (err) {
        removeTyping();
        appendMsg("⚠️ Couldn't reach the assistant. Make sure your backend server is running on localhost:5000.", 'bot');
      }
    }
  </script>
</body>
</html>
